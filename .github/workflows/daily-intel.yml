name: Daily Intel Pipeline

on:
  schedule:
    # 9:00 AM UTC daily (5 AM ET)
    - cron: '0 9 * * *'
    # 10:00 AM UTC every Monday (persona builder)
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes, no Discord)'
        required: false
        default: 'false'
        type: boolean
      step:
        description: 'Run specific step only'
        required: false
        type: choice
        options:
          - all
          - news
          - reddit
          - competitor
          - digest
          - persona
        default: all

jobs:
  intel-pipeline:
    if: github.event.schedule != '0 10 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml anthropic openai qdrant-client fuzzywuzzy python-Levenshtein

      - name: Write config from secrets
        run: |
          mkdir -p loop/config loop/state loop/output
          cat > loop/config/config.yaml << 'YAML'
          baserow:
            api_key: "${{ secrets.BASEROW_API_KEY }}"

          meta:
            access_token: "${{ secrets.META_ACCESS_TOKEN }}"

          llm:
            provider: "anthropic"
            model: "MiniMax-M2.5-highspeed"
            base_url: "https://api.minimax.io/anthropic"
            api_key: "${{ secrets.MINIMAX_API_KEY }}"

          qdrant:
            enabled: false
            url: "http://37.27.228.106:6333"
            signals_collection: "autoresearch-signals"

          discord:
            webhook_url: "${{ secrets.DISCORD_CREATIVE_SIGNALS_WEBHOOK }}"
            channel_id: "1482849535473614848"
            competitor_webhook_url: "${{ secrets.DISCORD_COMPETITOR_WATCH_WEBHOOK }}"
            competitor_channel_id: "1482851982837547048"
            intel_webhook_url: "${{ secrets.DISCORD_INTEL_WEBHOOK }}"
            intel_channel_id: "1482366898762022915"
            research_webhook_url: "${{ secrets.DISCORD_RESEARCH_WEBHOOK }}"
            research_channel_id: "1482667804359397438"
          YAML

      - name: Run news_watcher
        if: inputs.step == 'all' || inputs.step == 'news' || inputs.step == ''
        working-directory: loop/scripts
        run: |
          DRY=$([[ "${{ inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          python news_watcher.py $DRY --limit 5 --verticals-only
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CREATIVE_SIGNALS_WEBHOOK }}

      - name: Run reddit_source
        if: inputs.step == 'all' || inputs.step == 'reddit' || inputs.step == ''
        working-directory: loop/scripts
        run: |
          DRY=$([[ "${{ inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          python reddit_source.py $DRY --limit 5

      - name: Run competitor_watcher
        if: inputs.step == 'all' || inputs.step == 'competitor' || inputs.step == ''
        working-directory: loop/scripts
        run: |
          DRY=$([[ "${{ inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          python competitor_watcher.py $DRY

      - name: Run meta_ad_library
        if: inputs.step == 'all' || inputs.step == 'competitor' || inputs.step == ''
        working-directory: loop/scripts
        run: |
          DRY=$([[ "${{ inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          python meta_ad_library.py $DRY --limit 10
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}

      - name: Run intel_digest
        if: inputs.step == 'all' || inputs.step == 'digest' || inputs.step == ''
        working-directory: loop/scripts
        run: |
          DRY=$([[ "${{ inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          python intel_digest.py $DRY

      - name: Run signal_cards
        if: inputs.step == 'all' || inputs.step == 'digest' || inputs.step == ''
        working-directory: loop/scripts
        run: python signal_cards.py

      - name: Post signal cards to Discord
        if: inputs.step == 'all' || inputs.step == 'digest' || inputs.step == ''
        working-directory: loop/scripts
        run: python signal_cards.py --post
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CREATIVE_SIGNALS_WEBHOOK }}

      - name: Persist state and output
        if: always()
        run: |
          git config --local user.email "autoResearchClaw@github-actions"
          git config --local user.name "AutoResearchClaw"
          git add loop/state/ loop/output/ || true
          git diff --staged --quiet || git commit -m "chore: update intel state $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  persona-builder:
    if: github.event.schedule == '0 10 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml anthropic openai qdrant-client

      - name: Write config from secrets
        run: |
          mkdir -p loop/config loop/personas
          cat > loop/config/config.yaml << 'YAML'
          baserow:
            api_key: "${{ secrets.BASEROW_API_KEY }}"

          llm:
            provider: "anthropic"
            model: "MiniMax-M2.5-highspeed"
            base_url: "https://api.minimax.io/anthropic"
            api_key: "${{ secrets.MINIMAX_API_KEY }}"

          qdrant:
            enabled: false
            url: "http://37.27.228.106:6333"
            signals_collection: "autoresearch-signals"

          discord:
            webhook_url: "${{ secrets.DISCORD_CREATIVE_SIGNALS_WEBHOOK }}"
          YAML

      - name: Build Medicare persona
        working-directory: loop/scripts
        run: python persona_builder.py --vertical Medicare --post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build Auto Insurance persona
        working-directory: loop/scripts
        run: python persona_builder.py --vertical "Auto Insurance" --post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Persist personas
        if: always()
        run: |
          git config --local user.email "autoResearchClaw@github-actions"
          git config --local user.name "AutoResearchClaw"
          git add loop/personas/ || true
          git diff --staged --quiet || git commit -m "chore: weekly persona cards $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
